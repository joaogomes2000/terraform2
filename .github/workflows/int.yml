name: "DEV_DEPLOY"

on:
    push:
        branches:
            - int


permissions:
    id-token: write
    contents: write
    pull-requests: write


jobs:
    terraform:
        uses: ./.github/workflows/terraform.yml
        with:
            environment: int
            aws-assume-rol-arn: "arn:aws:iam::689046025087:role/github-action-joaogomes2000-pipeline"
            aws-region: "eu-north-1"
            aws-statefile-s3-bucket: "joaogomes2000-eu-noth-1-terraform-statefile"
            aws-lock-dynamodb-table: "joaogomes2000-eu-north-1-terraform-lock"
     
        
    create-pr:
        needs: terraform
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Create PR
              run: |
                gh pr create \
                --base main \
                --head int \
                --title "Auto promote int -> main" \
                --body "Automatic promotion"
              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Merge PR
              run: |
                gh pr merge int --merge --auto
              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}