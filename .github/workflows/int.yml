name: "DEV_DEPLOY"

on:
    push:
        branches:
            - int


permissions:
    id-token: write
    contents: write
    pull-requests: write


jobs:
    terraform:
        uses: ./.github/workflows/terraform.yml
        with:
            environment: int
            aws-assume-rol-arn: "arn:aws:iam::689046025087:role/github-action-joaogomes2000-pipeline"
            aws-region: "eu-north-1"
            #aws-statefile-s3-bucket: "joaogomes2000-eu-noth-1-terraform-statefile"
            #aws-lock-dynamodb-table: "joaogomes2000-eu-north-1-terraform-lock"
     
        
    create-pr:
        needs: terraform
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v6
              with:
                token: ${{ secrets.GITHUB_TOKEN }}
                base: main
                branch: int
                title: "Auto PR: int → main"
                body: "PR automático após deploy em int"